<html>
    <head>
      <title>JioTV+ | Blits OTT Demo</title>
      <style>
        html, body, * { padding: 0; margin: 0}
        html, body { background: #0B0B0B; overflow: hidden; width: 100%; height: 100%; }
        /*
          Blits sizes its canvas to a fixed 1920x1080 CSS pixel box (it targets
          fullscreen TVs, not resizable desktop windows). In a smaller browser
          window that would overflow and force scrollbars, clipping the top of
          the UI. This wrapper scales the whole app down (letterboxed, never
          cropped) to fit whatever window size it's actually running in.
        */
        #app {
          position: absolute;
          top: 0;
          left: 0;
          transform-origin: top left;
        }
      </style>
      <link rel="icon" href="assets/favicon.svg" type="image/svg">
      <meta charset="UTF-8" />
    </head>
    <body>
        <div id="app"></div>
        <script>
          (function () {
            var APP_W = 1920
            var APP_H = 1080

            function fitAppToWindow() {
              var app = document.getElementById('app')
              if (!app) return
              var scale = Math.min(window.innerWidth / APP_W, window.innerHeight / APP_H)
              var left = (window.innerWidth - APP_W * scale) / 2
              var top = (window.innerHeight - APP_H * scale) / 2
              app.style.transform = 'scale(' + scale + ')'
              app.style.left = left + 'px'
              app.style.top = top + 'px'
            }

            window.addEventListener('resize', fitAppToWindow)
            fitAppToWindow()
          })()
        </script>
        <script type="module" src="src/index.js"></script>
    </body>
</html>
